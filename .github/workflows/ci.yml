name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: PHP ${{ matrix.php }} × WP ${{ matrix.wp }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2', '8.3' ]
        wp:  [ '6.4', '6.5', '6.6' ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint (PHPCS)
        run: composer lint

      - name: Static analysis (PHPStan)
        run: composer stan
        env:
          # PHPStan with the WordPress stubs is memory-hungry on the
          # matrix's smaller runners. Bump the limit so the step
          # does not crash with "Child process error" before it can
          # even report a real finding.
          COMPOSER_MEMORY_LIMIT: -1

      - name: Test (PHPUnit)
        run: composer test
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_CORE_DIR: /tmp/wordpress
        # Only the 8.3 / 6.6 combination is run against a real WP
        # environment. Other matrix entries are smoke checks.
        continue-on-error: ${{ matrix.php != '8.3' || matrix.wp != '6.6' }}

  build:
    name: Build assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vitalink-ci-build
          path: trunk/build/
          if-no-files-found: error
